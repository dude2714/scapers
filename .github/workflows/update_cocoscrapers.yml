name: Update CocoScrapers Repository

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-download and repackage all addons"
        required: false
        default: "false"
        type: boolean
      dry_run:
        description: "Dry run — check for updates without committing"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  update:
    name: Check and update CocoScrapers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update script
        id: update
        env:
          FORCE: ${{ github.event.inputs.force == 'true' && '--force' || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        run: |
          python3 scripts/update_cocoscrapers.py $FORCE $DRY_RUN 2>&1 | tee /tmp/update.log
          echo "log_output<<EOF" >> "$GITHUB_OUTPUT"
          tail -20 /tmp/update.log >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check for repository changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git status --short
          fi

      - name: Validate repository structure
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "Validating repository structure..."
          python3 - <<'PYEOF'
          import sys
          from pathlib import Path
          from xml.etree import ElementTree as ET

          errors = []
          repo_dir = Path("repository")

          # Check addons.xml exists and is valid XML
          addons_xml = repo_dir / "zips" / "addons.xml"
          if not addons_xml.exists():
              errors.append("Missing: repository/zips/addons.xml")
          else:
              try:
                  ET.parse(str(addons_xml))
                  print(f"OK: {addons_xml}")
              except ET.ParseError as e:
                  errors.append(f"Invalid XML in {addons_xml}: {e}")

          # Check addons.xml.md5 exists
          md5_path = repo_dir / "zips" / "addons.xml.md5"
          if not md5_path.exists():
              errors.append("Missing: repository/zips/addons.xml.md5")
          else:
              print(f"OK: {md5_path}")

          # Check repository addon xml
          repo_addon_xml = repo_dir / "repository.cocoscrapers" / "addon.xml"
          if not repo_addon_xml.exists():
              errors.append("Missing: repository/repository.cocoscrapers/addon.xml")
          else:
              try:
                  ET.parse(str(repo_addon_xml))
                  print(f"OK: {repo_addon_xml}")
              except ET.ParseError as e:
                  errors.append(f"Invalid XML: {e}")

          if errors:
              print("\nVALIDATION ERRORS:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)
          else:
              print("\nAll validation checks passed ✓")
          PYEOF

      - name: Commit and push changes
        if: >
          steps.changes.outputs.has_changes == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all repository and metadata changes
          git add repository/ version.json

          # Build a descriptive commit message
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "chore: update CocoScrapers repository [${TIMESTAMP}]

          Changed files: ${CHANGED}

          Auto-generated by update_cocoscrapers workflow."

          git push origin HEAD

      - name: Summary
        if: always()
        run: |
          echo "### CocoScrapers Update Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Repository updated" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ No updates found — repository is already current" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.update.outputs.log_output }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
